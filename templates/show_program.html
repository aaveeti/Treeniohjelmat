<!DOCTYPE html>
<html>

<head>
  <title>{{ program.title }}</title>
</head>

<body>
  <h1>{{ program.title }}</h1>
  {% if session.user_id == program.user_id %}
  <p>
    <a href="/edit_program/{{ program.id }}">Muokkaa treeniohjelmaa</a>
  </p>
  {% endif %}
  <p>
    {{ program.content }}
  </p>
  <p>
    <strong>Julkaisija:</strong> {{ program.username }}
  </p>
  <p>
    <a href="/">Takaisin</a>
  </p>
</body>

</html>
